services:
  cybercert:
    build:
      context: .
      dockerfile: Dockerfile
    image: cybercert-command-center:latest
    container_name: cybercert-command-center
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
